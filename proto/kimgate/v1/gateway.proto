syntax = "proto3";

package kimgate.v1;

option go_package = "github.com/project-kgo/kim-gate/proto/kimgate/v1;kimgatev1";

enum PushTarget {
  PUSH_TARGET_UNSPECIFIED = 0;
  PUSH_TARGET_USERS = 1;
  PUSH_TARGET_GROUP = 2;
  PUSH_TARGET_BROADCAST = 3;
  PUSH_TARGET_CONNECTIONS = 4;
  PUSH_TARGET_CLOSE_USERS = 5;
  PUSH_TARGET_CLOSE_CONNECTIONS = 6;
}

message PushEvent {
  PushTarget target = 1;
  repeated string user_ids = 2;
  string group = 3;
  string method = 4;
  bytes payload = 5;
  repeated string connection_ids = 6;
}

service GatewayService {
  // Push and close RPCs are fire-and-forget: success means the event was
  // accepted by the gateway publish path, not that clients received it.
  rpc SendToUsers(SendToUsersRequest) returns (SendResponse);
  rpc SendToConnections(SendToConnectionsRequest) returns (SendResponse);
  rpc SendToGroup(SendToGroupRequest) returns (SendResponse);
  rpc Broadcast(BroadcastRequest) returns (SendResponse);
  rpc CloseUsers(CloseUsersRequest) returns (CloseResponse);
  rpc CloseConnections(CloseConnectionsRequest) returns (CloseResponse);
  rpc GetOnline(GetOnlineRequest) returns (GetOnlineResponse);
  rpc GetUserConnections(GetUserConnectionsRequest) returns (GetUserConnectionsResponse);
}

message SendToUsersRequest {
  repeated string user_ids = 1;
  string method = 2;
  bytes payload = 3;
}

message SendToConnectionsRequest {
  repeated string connection_ids = 1;
  string method = 2;
  bytes payload = 3;
}

message SendToGroupRequest {
  string group = 1;
  string method = 2;
  bytes payload = 3;
}

message BroadcastRequest {
  string method = 1;
  bytes payload = 2;
}

message SendResponse {
  // Reserved for future synchronous delivery reports. Fire-and-forget sends
  // currently return zero values when the event is accepted.
  int32 matched = 1;
  int32 sent = 2;
  int32 failed = 3;
  string error = 4;
}

message CloseUsersRequest {
  repeated string user_ids = 1;
}

message CloseConnectionsRequest {
  repeated string connection_ids = 1;
}

message CloseResponse {
  // Reserved for future synchronous close reports. Fire-and-forget closes
  // currently return zero values when the event is accepted.
  int32 matched = 1;
  int32 closed = 2;
  int32 failed = 3;
  string error = 4;
}

message GetOnlineRequest {
  string user_id = 1;
  string group = 2;
}

message GetOnlineResponse {
  int32 online = 1;
}

message GetUserConnectionsRequest {
  string user_id = 1;
}

message UserConnection {
  string connection_id = 1;
  string server_id = 2;
}

message GetUserConnectionsResponse {
  repeated UserConnection connections = 1;
}
